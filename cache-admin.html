<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friska Cache Control</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef1f4;
      margin: 0;
      padding: 24px 16px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .card {
      background: #fff;
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      padding: 28px 22px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    }
    h2 {
      margin: 0 0 4px;
      font-size: 22px;
      color: #1f2d3d;
    }
    .subtitle {
      margin: 0 0 24px;
      font-size: 14px;
      color: #7a8794;
    }
    button {
      width: 100%;
      padding: 16px;
      margin-bottom: 14px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.05s ease, opacity 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.55; cursor: default; }
    .btn-menu { background: #2e9e6b; }
    .btn-clients { background: #2f6fb0; }
    #status {
      margin-top: 8px;
      min-height: 22px;
      font-size: 14px;
      text-align: center;
      color: #5a6673;
    }
    #status.success { color: #2e9e6b; }
    #status.error { color: #c0392b; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Friska Cache Control</h2>
    <p class="subtitle">Refresh cached data from the backend.</p>

    <button class="btn-menu" onclick="refresh('refreshMenu', this)">
      Refresh Menu Cache
    </button>
    <button class="btn-clients" onclick="refresh('refreshClients', this)">
      Refresh Client Cache
    </button>

    <div id="status"></div>
  </div>

  <script src="config.js"></script>
  <script>
    const statusEl = document.getElementById("status");

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = type || "";
    }

    function refresh(action, btn) {
      const buttons = document.querySelectorAll("button");
      buttons.forEach(b => b.disabled = true);
      setStatus("Refreshing…", "");

      fetch(API_URL, {
        method: "POST",
        body: new URLSearchParams({ action })
      })
      .then(res => res.json())
      .then(data => {
        setStatus(data.message || "Done", "success");
      })
      .catch(() => {
        setStatus("Error occurred. Please try again.", "error");
      })
      .finally(() => {
        buttons.forEach(b => b.disabled = false);
      });
    }
  </script>
</body>
</html>
